---
aliases:
  directory: &directory tmp/${JU_CONFIG_VENDOR}/${JU_CONFIG_ARCH}/${JU_CONFIG_VERSION}
  # https://github.com/vaskovsky/notify-send
  notify-on-failure: &notify-on-failure
    path: D:\dev\src\notify-send\notify-send.exe
    args:
      - "failed"
      - "${JU_ERROR}\n${JU_DIRECTORY} [${JU_VENDOR_NAME} (${JU_VENDOR_ID})]"
    directory: "${env.windir}"
  notify-on-update: &notify-on-update
    path: D:\dev\src\notify-send\notify-send.exe
    args:
      - "updated"
      - "${JU_OLD_VERSION:-n/a} -> ${JU_NEW_VERSION}\n${JU_DIRECTORY} [${JU_VENDOR_NAME} (${JU_VENDOR_ID})]"
    directory: "${env.windir}"

installations:

  # Azul

  - vendor: azul
    architecture: i686
    directory: tmp/${JU_CONFIG_VENDOR}/x86/${JU_CONFIG_VERSION}
    # enabled: false
    type: jdk
    version: "8"
    on-failure:
      - *notify-on-failure
    on-update:
      - *notify-on-update

  # Eclipse

  - vendor: eclipse
    directory: *directory
    # enabled: false
    type: jdk
    version: 17
    on-failure:
      - *notify-on-failure
    on-success:
      - path: powershell.exe
        args:
          # set JAVA_HOME_17 for the current user
          - "[System.Environment]::SetEnvironmentVariable('JAVA_HOME_${JU_CONFIG_VERSION}', '${JU_DIRECTORY}', 'User')"
      - path: powershell.exe
        args:
          # set JAVA_HOME for the current user
          - "[System.Environment]::SetEnvironmentVariable('JAVA_HOME', '${JU_DIRECTORY}', 'User')"
    on-update:
      - *notify-on-update

  - vendor: eclipse
    directory: *directory
    # enabled: false
    type: jdk
    version: 21
    on-failure:
      - *notify-on-failure
    on-success:
      - path: powershell.exe
        args:
          # set JAVA_HOME_21 for the current user
          - "[System.Environment]::SetEnvironmentVariable('JAVA_HOME_${JU_CONFIG_VERSION}', '${JU_DIRECTORY}', 'User')"
    on-update:
      - *notify-on-update
