---
aliases:
  directory: &directory tmp/${JU_CONFIG_VENDOR}/${JU_CONFIG_ARCH}/${JU_CONFIG_VERSION}
  # Fedora: sudo dnf install libnotify
  # Debian: sudo apt install notify-send
  notify-on-failure: &notify-on-failure
    path: notify-send
    args:
      - "failed"
      - "${JU_ERROR}\n${JU_DIRECTORY} [${JU_VENDOR_NAME} (${JU_VENDOR_ID})]"
  notify-on-update: &notify-on-update
    path: notify-send
    args:
      - "updated"
      - "${JU_OLD_VERSION:-n/a} -> ${JU_NEW_VERSION}\n${JU_DIRECTORY} [${JU_VENDOR_NAME} (${JU_VENDOR_ID})]"

settings:

installations:

  # Azul

  - vendor: azul
    architecture: i686
    directory: tmp/${JU_CONFIG_VENDOR}/x86/${JU_CONFIG_VERSION}
    # enabled: false
    type: jdk
    version: "8"
    on-failure:
      - *notify-on-failure
    on-update:
      - *notify-on-update

  # Eclipse

  - vendor: eclipse
    directory: *directory
    # enabled: false
    type: jdk
    version: 17
    on-failure:
      - *notify-on-failure
    on-update:
      - *notify-on-update
